name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-uring:
    name: Linux io_uring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev libcmocka-dev
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure
      
      - name: Print backend info
        run: |
          cd build/tests
          ./test_basic || true

  linux-threads:
    name: Linux threads backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev
      
      - name: Configure (force threads)
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DIOR_FORCE_THREADS=ON
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux-uring-asan:
    name: Linux io_uring + AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev libcmocka-dev
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DIOR_ENABLE_ASAN=ON
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

  linux-threads-asan:
    name: Linux threads + AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DIOR_FORCE_THREADS=ON -DIOR_ENABLE_ASAN=ON
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1

  linux-threads-tsan:
    name: Linux threads + ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DIOR_FORCE_THREADS=ON -DIOR_ENABLE_TSAN=ON
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          TSAN_OPTIONS: halt_on_error=1:history_size=7:second_deadlock_stack=1

  macos:
    name: macOS (threads only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: brew install cmocka
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos-asan:
    name: macOS + AddressSanitizer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: brew install cmocka
      
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DIOR_ENABLE_ASAN=ON
      
      - name: Build
        run: cmake --build build
      
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1

  windows-iocp:
    name: Windows IOCP (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # Sets up the MSVC developer environment and sets VCPKG_ROOT to the
      # VS-bundled vcpkg, which the windows-msvc preset's toolchain path uses.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # No explicit "vcpkg install" step: cmocka is declared in vcpkg.json and
      # installed automatically at configure time via the vcpkg toolchain
      # (manifest mode). This works regardless of which vcpkg distribution
      # VCPKG_ROOT points at.
      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build
        run: cmake --build --preset windows-msvc

      - name: Test
        run: ctest --preset windows-msvc --output-on-failure

      - name: Print backend info
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter test_basic.exe build | Select-Object -First 1
          if ($exe) { & $exe.FullName } else { Write-Host "test_basic.exe not found" }

  windows-iocp-asan:
    name: Windows IOCP + AddressSanitizer (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # Sets up the MSVC developer environment (PATH, VCToolsInstallDir,
      # VCPKG_ROOT, etc.) for all later steps. The ASan test preset relies on
      # VCToolsInstallDir to locate clang_rt.asan_dynamic-x86_64.dll at test
      # runtime; the preset toolchain path uses VCPKG_ROOT.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # cmocka comes from vcpkg.json at configure time (manifest mode).
      - name: Configure
        run: cmake --preset windows-msvc-asan

      - name: Build
        run: cmake --build --preset windows-msvc-asan

      - name: Test
        run: ctest --preset windows-msvc-asan --output-on-failure
